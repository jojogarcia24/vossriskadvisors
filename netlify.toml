# Netlify configuration for Voss Risk Advisors

[build]
  publish   = "public"
  functions = "netlify/functions"

# The Supabase project URL and anon (public) key are embedded in
# public/index.html on purpose — they're safe client-side and protected by
# Row Level Security. Tell Netlify's secrets scanner to allow those two keys
# so the build doesn't fail, while still guarding the real secrets
# (SUPABASE_SERVICE_ROLE, RESEND_API_KEY, ANTHROPIC_API_KEY).
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"

# Weekly AI blog post — runs every Monday at 14:00 UTC (9am CT).
# Adjust the cron as you like: https://crontab.guru
[functions."weekly-post"]
  schedule = "0 14 * * 1"

# Monthly newsletter — drafts an issue and emails the agency for approval on
# the 1st of each month at 15:00 UTC (~10am CT). Nothing sends without approval.
[functions."newsletter-monthly"]
  schedule = "0 15 1 * *"

[[redirects]]
  from = "/api/quote"
  to   = "/.netlify/functions/submit-quote"
  status = 200

# Carrier appointments admin portal (password-protected page + API)
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

[[redirects]]
  from = "/api/carriers"
  to   = "/.netlify/functions/carriers-admin"
  status = 200

# Endpoint the Google Sheet's Apps Script posts edits back to (Google -> Voss)
[[redirects]]
  from = "/api/carriers-webhook"
  to   = "/.netlify/functions/carriers-webhook"
  status = 200

[[redirects]]
  from = "/unsubscribe"
  to   = "/.netlify/functions/unsubscribe"
  status = 200

[[redirects]]
  from = "/newsletter/review"
  to   = "/.netlify/functions/newsletter-review"
  status = 200

[[redirects]]
  from = "/blog/review"
  to   = "/.netlify/functions/blog-review"
  status = 200
